<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Plataforma de Análisis Seguro</title>
    <style>
        body { font-family: Arial; max-width: 800px; 
               margin: 50px auto; background: #f5f5f5; }
        .container { background: white; padding: 30px; 
                     border-radius: 8px; }
        button { background: #232f3e; color: white; 
                 padding: 10px 20px; border: none; 
                 border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Plataforma de Análisis Seguro</h1>
        <p>Sube tu archivo de datos para analizarlo</p>
        <input type="file" id="fileInput" accept=".csv,.json">
        <br><br>
        <button onclick="subirArchivo()">Subir y Analizar</button>
        <div id="resultado"></div>
    </div>
    <script>
        async function subirArchivo() {
            const file = document.getElementById('fileInput').files[0];
            if (!file) { alert('Selecciona un archivo'); return; }
            const formData = new FormData();
            formData.append('file', file);
            document.getElementById('resultado').innerHTML = 
                '⏳ Analizando...';
            const res = await fetch('http://localhost:8000/upload', {
                method: 'POST', body: formData
            });
            const data = await res.json();
            document.getElementById('resultado').innerHTML = 
                `<pre>${JSON.stringify(data, null, 2)}</pre>`;
        }
    </script>
</body>
</html>
